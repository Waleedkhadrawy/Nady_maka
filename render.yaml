services:
  - type: web
    name: makkah-yard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:server
    autoDeploy: true
    healthCheckPath: /api/settings
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
